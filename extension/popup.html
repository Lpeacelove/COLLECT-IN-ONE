<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>收藏此页面</title>
  <style>
    body {
      width: 320px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
    }
    h1 {
      font-size: 16px;
      margin: 0 0 12px;
    }
    .page-info {
      margin-bottom: 12px;
      word-break: break-all;
    }
    .page-title {
      font-weight: 600;
      margin-bottom: 4px;
    }
    .page-url {
      color: #666;
      font-size: 12px;
    }
    #collectBtn {
      width: 100%;
      padding: 8px;
      background: #1a73e8;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }
    #collectBtn:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    #loading {
      display: none;
      text-align: center;
      margin-top: 8px;
      color: #666;
    }
    #status {
      display: none;
      margin-top: 8px;
      padding: 6px 8px;
      border-radius: 4px;
      font-size: 13px;
    }
    .status-success {
      background: #e6f4ea;
      color: #1e7e34;
    }
    .status-error {
      background: #fce8e6;
      color: #c62828;
    }
    .status-duplicate {
      background: #fff8e1;
      color: #f57f17;
    }
  </style>
</head>
<body>
  <h1>Collect In One</h1>
  <div class="page-info">
    <div class="page-title" id="pageTitle"></div>
    <div class="page-url" id="pageUrl"></div>
  </div>
  <button id="collectBtn">收藏此页面</button>
  <div id="loading">处理中...</div>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
